<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nested Boxes UI</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom, #1a232a, #405060);
        }

        .outer-box {
            width: 250px;
            height: 300px;
            border: 3px solid white;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .inner-box {
            width: 150px;
            height: 180px;
            border: 2px solid white;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .number {
            font-size: 24px;
            color: white;
            margin-bottom: 10px;
        }

        button {
            padding: 8px 15px;
            background: transparent;
            color: white;
            border: 1px solid white;
            cursor: pointer;
        }

        button:hover {
            background: white;
            color: black;
        }
    </style>
</head>
<body>

    <div class="outer-box">
        <div class="inner-box">
            <div class="number">1</div>
            <button>Click!</button>
        </div>
        <div class="number" style="position: absolute; top: 10px;">2</div>
    </div>
<script src="3.js"></script>
</body>
</html>
